name: Restore smoke test

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  RELEASE_TAG: v2026.06.03
  TOOLCHAIN_ARCHIVE: avr32-tools-src-macos-arm64-20260603.tar.gz

jobs:
  restore-smoke-test:
    name: Restore and link AVR32 ELF
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$TOOLCHAIN_ARCHIVE" \
            --pattern "$TOOLCHAIN_ARCHIVE.sha256"

      - name: Verify checksum
        run: |
          shasum -a 256 -c "checksums/$TOOLCHAIN_ARCHIVE.sha256"

      - name: Unpack toolchain
        run: |
          mkdir -p restored
          tar -xzf "$TOOLCHAIN_ARCHIVE" -C restored

      - name: Smoke test compiler and linker
        run: |
          scripts/smoke-test.sh "$PWD/restored/avr32-tools-src"

